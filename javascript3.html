<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>O que o javascript faz?</h1>
    <p id="demo" style="display:none">Hola javascript</p>
    <button type="button" onclick="document.getElementById('demo').style.fontSize='31px'">aumenta</button>

    <button type="button" onclick="document.getElementById('demo').style.display='black'">Mostra</button>

    <button type="button"
    onclick="document.getElementById('demo').style.display = 'none'">Esconde!</button>
